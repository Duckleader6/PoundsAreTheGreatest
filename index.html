<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pounds Converter</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #252526;
            border-bottom: 1px solid #3e3e42;
        }

        .header h1 {
            font-size: 20px;
        }

        .btn {
            padding: 8px 16px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .btn:hover {
            background-color: #005a9e;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 10px;
            overflow: hidden;
        }

        .output {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .input-line {
            display: flex;
            gap: 8px;
        }

        .input-line input {
            flex: 1;
            background-color: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #e0e0e0;
            padding: 6px 10px;
            font-family: 'Courier New', monospace;
            border-radius: 2px;
        }

        .input-line input:focus {
            outline: none;
            border-color: #007acc;
        }

        .input-line button {
            padding: 6px 12px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }

        .input-line button:hover {
            background-color: #005a9e;
        }

        .loading {
            text-align: center;
            color: #858585;
            padding: 20px;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #464647;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5a5a5a;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pounds Converter</h1>
        <button class="btn" onclick="window.location.href='conversiontable.html';">📋 Conversion Table</button>
    </div>
    <div class="container">
        <div class="output" id="output"><div class="loading">Loading...</div></div>
        <div class="input-line">
            <input type="text" id="input" disabled placeholder="Waiting..." autocomplete="off">
            <button id="btn" onclick="submit()" disabled>Send</button>
        </div>
    </div>

    <script>
        let py = null;
        let inputResolve = null;

        async function init() {
            try {
                py = await loadPyodide();
                
                const resp = await fetch('converter.py');
                const code = await resp.text();
                
                // Set up output capture
                py.runPython(`
import sys

class OutputCapture:
    def __init__(self):
        self.buffer = ""
    def write(self, text):
        self.buffer += text
        return len(text)
    def flush(self):
        pass

output = OutputCapture()
sys.stdout = output
sys.stderr = output

# Override input to work with JS
pending_input = ""

def custom_input(prompt=""):
    global pending_input
    if prompt:
        sys.stdout.write(prompt)
        sys.stdout.flush()
    from js import wait_for_input
    pending_input = wait_for_input()
    return pending_input

__builtins__.input = custom_input
                `);
                
                // Make wait_for_input accessible from Python
                window.wait_for_input = function() {
                    return new Promise(r => { inputResolve = r; });
                };
                
                document.getElementById('output').innerHTML = '';
                document.getElementById('input').disabled = false;
                document.getElementById('btn').disabled = false;
                
                // Run the converter script in background
                setTimeout(() => {
                    try {
                        py.runPython(code);
                    } catch(e) {
                        console.log('Script finished or waiting for input');
                    }
                }, 100);
                
                pollOutput();
                
            } catch(e) {
                document.getElementById('output').textContent = 'Error: ' + e.message;
            }
        }

        function pollOutput() {
            if (py) {
                try {
                    const output = py.globals.get('output');
                    const text = output.buffer;
                    if (text) {
                        document.getElementById('output').textContent = text;
                        document.getElementById('output').scrollTop = document.getElementById('output').scrollHeight;
                    }
                } catch(e) {}
            }
            setTimeout(pollOutput, 150);
        }

        function submit() {
            const input = document.getElementById('input');
            const val = input.value;
            input.value = '';
            if (inputResolve) {
                inputResolve(val);
                inputResolve = null;
            }
        }

        document.getElementById('input').addEventListener('keypress', e => {
            if (e.key === 'Enter') submit();
        });

        init();
    </script>
</body>
</html>
