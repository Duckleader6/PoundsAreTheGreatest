<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pounds Converter Terminal</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #252526;
            border-bottom: 1px solid #3e3e42;
        }

        .header h1 {
            font-size: 20px;
            font-weight: bold;
        }

        .conversion-table-btn {
            padding: 8px 16px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .conversion-table-btn:hover {
            background-color: #005a9e;
        }

        .terminal-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 10px;
            background-color: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
        }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #1e1e1e;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
            padding: 0 15px 15px 15px;
            background-color: #1e1e1e;
            gap: 8px;
        }

        .terminal-input {
            flex: 1;
            background-color: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #e0e0e0;
            padding: 6px 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 2px;
        }

        .terminal-input:focus {
            outline: none;
            border-color: #007acc;
            box-shadow: 0 0 0 1px #007acc;
        }

        .send-btn {
            padding: 6px 12px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .send-btn:hover {
            background-color: #005a9e;
        }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #1e1e1e;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #858585;
        }

        /* Scrollbar styling */
        .terminal-output::-webkit-scrollbar {
            width: 10px;
        }

        .terminal-output::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .terminal-output::-webkit-scrollbar-thumb {
            background: #464647;
            border-radius: 5px;
        }

        .terminal-output::-webkit-scrollbar-thumb:hover {
            background: #5a5a5a;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pounds Converter Terminal</h1>
        <button class="conversion-table-btn" onclick="window.location.href='conversiontable.html';">
            📋 Conversion Table
        </button>
    </div>

    <div class="terminal-container">
        <div class="terminal-output" id="output">
            <div class="loading">Loading Python environment...</div>
        </div>
        <div class="terminal-input-line">
            <input
                type="text"
                id="userInput"
                class="terminal-input"
                placeholder="Enter your input here..."
                autocomplete="off"
                disabled
            />
            <button class="send-btn" id="sendBtn" onclick="sendInput()" disabled>Send</button>
        </div>
    </div>

    <script>
        let py = null;
        let outputBuffer = '';
        let inputQueue = [];

        async function initializePython() {
            try {
                py = await loadPyodide();
                
                // Fetch the converter script
                const response = await fetch('converter.py');
                const converterCode = await response.text();
                
                // Set up custom input/output handling
                const setupCode = `
import sys
import io

output_buffer = ""

class OutputCapture:
    def write(self, text):
        global output_buffer
        output_buffer += text
        return len(text)
    
    def flush(self):
        pass

class InputCapture:
    def __init__(self):
        self.input_queue = []
    
    def add_input(self, line):
        self.input_queue.append(line + '\\n')
    
    def readline(self):
        import time
        while not self.input_queue:
            time.sleep(0.05)
        return self.input_queue.pop(0)

input_capture = InputCapture()

sys.stdout = OutputCapture()
sys.stderr = OutputCapture()

original_input = __builtins__.input

def custom_input(prompt=''):
    if prompt:
        sys.stdout.write(prompt)
        sys.stdout.flush()
    
    import time
    while not input_capture.input_queue:
        time.sleep(0.05)
    
    user_input = input_capture.input_queue.pop(0)
    return user_input.rstrip('\\n')

__builtins__.input = custom_input
                `;
                
                py.runPython(setupCode);
                py.runPython(converterCode);
                
                document.getElementById('output').innerHTML = '';
                document.getElementById('userInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('userInput').focus();
                
                // Start polling for output
                pollOutput();
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('output').innerHTML = '<div style="color: #f48771;">Error: ' + error.message + '</div>';
            }
        }

        function pollOutput() {
            try {
                const result = py.globals.get('output_buffer');
                if (result && result !== outputBuffer) {
                    const newContent = result.substring(outputBuffer.length);
                    outputBuffer = result;
                    
                    const output = document.getElementById('output');
                    const span = document.createElement('span');
                    span.textContent = newContent;
                    output.appendChild(span);
                    
                    output.scrollTop = output.scrollHeight;
                }
            } catch (e) {
                console.error('Poll error:', e);
            }
            
            setTimeout(pollOutput, 100);
        }

        function sendInput() {
            const input = document.getElementById('userInput').value;
            if (!input) return;

            try {
                const inputCapture = py.globals.get('input_capture');
                inputCapture.add_input(input);
            } catch (e) {
                console.error('Error sending input:', e);
            }
            
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').focus();
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendInput();
            }
        });

        window.addEventListener('load', initializePython);
    </script>
</body>
</html>
