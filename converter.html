<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pounds Converter Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #1e1e1e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #252526;
            border-bottom: 1px solid #3e3e42;
        }

        .header h1 {
            font-size: 20px;
            font-weight: bold;
        }

        .conversion-table-btn {
            padding: 8px 16px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .conversion-table-btn:hover {
            background-color: #005a9e;
        }

        .terminal-container {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 10px;
            background-color: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
        }

        .terminal-output {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #1e1e1e;
        }

        .terminal-input-line {
            display: flex;
            align-items: center;
            padding: 0 15px 15px 15px;
            background-color: #1e1e1e;
            gap: 8px;
        }

        .terminal-input {
            flex: 1;
            background-color: #1e1e1e;
            border: 1px solid #3e3e42;
            color: #e0e0e0;
            padding: 6px 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 2px;
        }

        .terminal-input:focus {
            outline: none;
            border-color: #007acc;
            box-shadow: 0 0 0 1px #007acc;
        }

        .send-btn {
            padding: 6px 12px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .send-btn:hover {
            background-color: #005a9e;
        }

        .output-text {
            margin-bottom: 2px;
            line-height: 1.4;
        }

        /* Scrollbar styling */
        .terminal-output::-webkit-scrollbar {
            width: 10px;
        }

        .terminal-output::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .terminal-output::-webkit-scrollbar-thumb {
            background: #464647;
            border-radius: 5px;
        }

        .terminal-output::-webkit-scrollbar-thumb:hover {
            background: #5a5a5a;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pounds Converter Terminal</h1>
        <button class="conversion-table-btn" onclick="window.location.href='conversiontable.html';">
            📋 Conversion Table
        </button>
    </div>

    <div class="terminal-container">
        <div class="terminal-output" id="output"></div>
        <div class="terminal-input-line">
            <input
                type="text"
                id="userInput"
                class="terminal-input"
                placeholder="Enter your input here..."
                autocomplete="off"
            />
            <button class="send-btn" onclick="sendInput()">Send</button>
        </div>
    </div>

    <script>
        let state = 'START';
        let conversionValue = 0;
        let conversionGroup = 0;
        let conversionTarget = 0;

        const conversions = {
            '1_1': { name: 'Grams', factor: 453.592 },
            '1_2': { name: 'Milligrams', factor: 453592 },
            '1_3': { name: 'Kilograms', factor: 0.453592 },
            '1_4': { name: 'Metric Ton', factor: 0.000453592 },
            '1_5': { name: 'Ounce', factor: 16 },
            '1_6': { name: 'Pound', factor: 1 },
            '1_7': { name: 'Stone', factor: 0.0714286 },
            '1_8': { name: 'Hundredweight', factor: 0.02 },
            '1_9': { name: 'US Ton', factor: 0.0005 },
            '2_1_1': { name: 'Grains', factor: 7000 },
            '2_1_2': { name: 'Pennyweights', factor: 700 },
            '2_1_3': { name: 'Troy Ounces', factor: 14.5833 },
            '2_1_4': { name: 'Troy Pounds', factor: 0.583333 },
            '2_1_5': { name: 'Apothecary Ounces', factor: 12 },
            '2_1_6': { name: 'Apothecary Pounds', factor: 1 },
            '2_1_7': { name: 'Dram', factor: 256 },
            '2_1_8': { name: 'Scruple', factor: 768 },
        };

        function printOutput(text) {
            const output = document.getElementById('output');
            const lines = text.split('\n');
            
            lines.forEach((line) => {
                if (line) {
                    const div = document.createElement('div');
                    div.className = 'output-text';
                    div.textContent = line;
                    output.appendChild(div);
                }
            });
            
            output.scrollTop = output.scrollHeight;
        }

        function showMenu() {
            let menu = "\nWhat would you like to convert from?\n(1)Pounds\n(2)Something Else BTW if it is something else you can only go to pounds.\n";
            printOutput(menu);
        }

        function showGroupMenu() {
            let menu = "\nWhat Group of Stuff?\n(1)Convential Units\n(2)Unconventional Units (still real just not very usable)\n(3)Just stupid stuff\n";
            printOutput(menu);
        }

        function showConventionalUnits() {
            let menu = "\nWhat would you like to convert to?\n(1)Grams\n(2)Milligrams\n(3)Kilograms\n(4)Metric Ton\n(5)Ounce\n(6)Pound\n(7)Stone\n(8)Hundredweight\n(9)US Ton\n";
            printOutput(menu);
        }

        function showTroyMenu() {
            let menu = "\nWhat group of stuff?\n(1)Troy and Apothecary units\n(2)Tower Weights\n(3)Roman Units\n(4)Babylonian Units\n(5)Ancient Egyptian Units\n(6)Misc stuff that I might organize later\n";
            printOutput(menu);
        }

        function showTroyUnits() {
            let menu = "\nWhat would you like to convert to?\n(1)Grains\n(2)Pennyweights\n(3)Troy Ounces\n(4)Troy Pounds\n(5)Apothecary Ounces\n(6)Apothecary Pounds\n(7)Dram\n(8)Scruple\n";
            printOutput(menu);
        }

        function sendInput() {
            const input = document.getElementById('userInput').value;
            if (!input) return;

            printOutput('> ' + input);
            document.getElementById('userInput').value = '';

            if (state === 'START') {
                const choice = parseInt(input);
                if (choice === 1) {
                    state = 'GET_AMOUNT';
                    printOutput('How many pounds?\n');
                } else if (choice === 2) {
                    printOutput('Not implemented yet.');
                    state = 'START';
                    showMenu();
                } else {
                    printOutput('Invalid input. Please try again.');
                    showMenu();
                }
            } else if (state === 'GET_AMOUNT') {
                conversionValue = parseFloat(input);
                if (isNaN(conversionValue)) {
                    printOutput('Invalid number. Try again.');
                    printOutput('How many pounds?\n');
                } else {
                    state = 'GET_GROUP';
                    showGroupMenu();
                }
            } else if (state === 'GET_GROUP') {
                conversionGroup = parseInt(input);
                if (conversionGroup === 1) {
                    state = 'GET_UNIT';
                    showConventionalUnits();
                } else if (conversionGroup === 2) {
                    state = 'GET_SUBGROUP';
                    showTroyMenu();
                } else if (conversionGroup === 3) {
                    printOutput('Stupid stuff not implemented yet.');
                    state = 'START';
                    showMenu();
                } else {
                    printOutput('Invalid input. Try again.');
                    showGroupMenu();
                }
            } else if (state === 'GET_UNIT') {
                conversionTarget = parseInt(input);
                const key = '1_' + conversionTarget;
                if (conversions[key]) {
                    const result = conversionValue * conversions[key].factor;
                    printOutput(result.toString());
                    printOutput('');
                    state = 'START';
                    showMenu();
                } else {
                    printOutput('Invalid input. Try again.');
                    showConventionalUnits();
                }
            } else if (state === 'GET_SUBGROUP') {
                const subgroup = parseInt(input);
                if (subgroup === 1) {
                    state = 'GET_TROY_UNIT';
                    showTroyUnits();
                } else {
                    printOutput('Other subgroups not implemented yet.');
                    state = 'START';
                    showMenu();
                }
            } else if (state === 'GET_TROY_UNIT') {
                conversionTarget = parseInt(input);
                const key = '2_1_' + conversionTarget;
                if (conversions[key]) {
                    const result = conversionValue * conversions[key].factor;
                    printOutput(result.toString());
                    printOutput('');
                    state = 'START';
                    showMenu();
                } else {
                    printOutput('Invalid input. Try again.');
                    showTroyUnits();
                }
            }
        }

        // Initialize
        window.addEventListener('load', () => {
            printOutput("I won't lie I am like very bad at organizing and for some stuff I don't wanna so I will make a list that you can search on to find all of them. Any suggestions can go in the issues area.\n");
            showMenu();
            document.getElementById('userInput').focus();
        });

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendInput();
            }
        });
    </script>
</body>
</html>
